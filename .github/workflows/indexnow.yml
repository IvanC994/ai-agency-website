name: Notify IndexNow

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: indexnow-${{ github.ref }}
  cancel-in-progress: true

jobs:
  notify:
    name: Submit changed URLs
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Wait for deploy and notify IndexNow
        run: npm run indexnow
        env:
          INDEXNOW_BEFORE: ${{ github.event.before }}
          INDEXNOW_AFTER: ${{ github.sha }}
          INDEXNOW_DEPLOY_DELAY_SECONDS: ${{ github.event_name == 'push' && '90' || '0' }}
