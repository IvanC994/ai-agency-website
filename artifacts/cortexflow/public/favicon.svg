<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <!-- Rounded-square background -->
  <rect width="180" height="180" rx="40" fill="url(#bg)"/>

  <!-- Connecting line -->
  <line x1="40" y1="140" x2="125" y2="55"
        stroke="url(#glow)" stroke-width="10" stroke-linecap="round"/>

  <!-- Dashed orbit ring around largest node -->
  <circle cx="125" cy="55" r="50"
          stroke="#38bdf8" stroke-width="3.5"
          stroke-dasharray="10 12" fill="none" opacity="0.35"/>

  <!-- Small node (bottom-left) -->
  <circle cx="40"  cy="140" r="22" fill="url(#glow)"/>

  <!-- Medium node (centre) -->
  <circle cx="83"  cy="97"  r="27" fill="url(#glow)"/>

  <!-- Large node (top-right) -->
  <circle cx="125" cy="55"  r="35" fill="url(#glow)"/>
</svg>
