kind = "web"
previewPath = "/"
title = "CortexFlow"
version = "1.0.0"
id = "artifacts/cortexflow"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18188

[services.development]
run = "pnpm --filter @workspace/cortexflow run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cortexflow", "run", "build" ]
serve = "static"
publicDir = "artifacts/cortexflow/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18188"
BASE_PATH = "/"
