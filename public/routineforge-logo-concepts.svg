<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">RoutineForge logo concept board</title>
  <desc id="desc">Three visual logo directions for RoutineForge: Forge Path, Forged RF, and Anvil Circuit.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#0284C7" />
      <stop offset="1" stop-color="#22D3EE" />
    </linearGradient>
    <linearGradient id="forge" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#F97316" />
      <stop offset="1" stop-color="#FBBF24" />
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="26" flood-color="#0F172A" flood-opacity="0.18" />
    </filter>
    <style>
      .bg { fill: #F8FAFC; }
      .panel { fill: #FFFFFF; stroke: #E2E8F0; stroke-width: 2; filter: url(#softShadow); }
      .navy { fill: #020617; }
      .slate { fill: #475569; }
      .muted { fill: #64748B; }
      .accent { fill: #F97316; }
      .title { font: 800 52px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: -0.04em; fill: #020617; }
      .subtitle { font: 500 20px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748B; }
      .label { font: 800 26px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #020617; }
      .copy { font: 500 16px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748B; }
      .wordmark { font: 800 40px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: -0.055em; fill: #020617; }
      .tagline { font: 600 14px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0.14em; fill: #64748B; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="1000" />
  <circle cx="1400" cy="120" r="280" fill="#E0F2FE" opacity="0.65" />
  <circle cx="160" cy="880" r="320" fill="#FFEDD5" opacity="0.45" />

  <text x="100" y="118" class="title">RoutineForge logo concepts</text>
  <text x="102" y="154" class="subtitle">Three directions blending repeatable workflows, AI automation, and crafted systems.</text>

  <g transform="translate(100 220)">
    <rect class="panel" width="430" height="620" rx="36" />
    <g transform="translate(115 68)">
      <rect width="200" height="200" rx="44" fill="#020617" />
      <path d="M68 150V55h58c34 0 55 18 55 47 0 24-15 40-39 45l42 3" fill="none" stroke="url(#sky)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" />
      <path d="M68 104h72" fill="none" stroke="url(#sky)" stroke-width="16" stroke-linecap="round" />
      <path d="M68 150 122 104 176 62" fill="none" stroke="url(#sky)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" />
      <circle cx="68" cy="150" r="14" fill="#020617" stroke="#38BDF8" stroke-width="7" />
      <circle cx="122" cy="104" r="16" fill="#020617" stroke="#38BDF8" stroke-width="7" />
      <circle cx="176" cy="62" r="16" fill="url(#forge)" />
      <path d="M184 34 190 50 206 56 190 62 184 78 178 62 162 56 178 50Z" fill="#FBBF24" />
    </g>
    <text x="60" y="345" class="label">1. Forge Path</text>
    <text x="60" y="386" class="copy">An R-shaped workflow path with nodes</text>
    <text x="60" y="410" class="copy">and a small forge spark.</text>
    <g transform="translate(58 472)">
      <path d="M0 0h50v38h-50z" fill="#020617" rx="10" />
      <path d="M16 30V9h14c8 0 13 4 13 10 0 6-4 9-9 10l9 1" fill="none" stroke="url(#sky)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
      <circle cx="42" cy="10" r="4" fill="#F97316" />
      <text x="66" y="30" class="wordmark">RoutineForge</text>
    </g>
    <text x="60" y="560" class="tagline">BEST ALL-AROUND DIRECTION</text>
  </g>

  <g transform="translate(585 220)">
    <rect class="panel" width="430" height="620" rx="36" />
    <g transform="translate(115 68)">
      <rect width="200" height="200" rx="44" fill="#020617" />
      <path d="M61 152V52h60c35 0 55 17 55 45 0 22-14 38-37 44" fill="none" stroke="url(#sky)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" />
      <path d="M62 101h72" fill="none" stroke="url(#sky)" stroke-width="16" stroke-linecap="round" />
      <path d="M121 152V96h60" fill="none" stroke="url(#forge)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" />
      <path d="M121 124h48" fill="none" stroke="url(#forge)" stroke-width="16" stroke-linecap="round" />
      <path d="M145 43 158 76" stroke="#FBBF24" stroke-width="7" stroke-linecap="round" />
    </g>
    <text x="60" y="345" class="label">2. Forged RF</text>
    <text x="60" y="386" class="copy">A premium RF monogram with blue</text>
    <text x="60" y="410" class="copy">automation and amber forge cuts.</text>
    <g transform="translate(58 472)">
      <path d="M0 0h50v38h-50z" fill="#020617" rx="10" />
      <text x="11" y="28" font-family="Inter, ui-sans-serif, system-ui" font-size="24" font-weight="900" fill="url(#sky)">R</text>
      <text x="26" y="28" font-family="Inter, ui-sans-serif, system-ui" font-size="24" font-weight="900" fill="url(#forge)">F</text>
      <text x="66" y="30" class="wordmark">RoutineForge</text>
    </g>
    <text x="60" y="560" class="tagline">MOST PREMIUM / B2B</text>
  </g>

  <g transform="translate(1070 220)">
    <rect class="panel" width="430" height="620" rx="36" />
    <g transform="translate(115 68)">
      <rect width="200" height="200" rx="44" fill="#020617" />
      <path d="M45 84h110c14 0 24 10 24 23v7H127l-23 32H68l-18-32H22v-7c0-13 10-23 23-23Z" fill="none" stroke="url(#sky)" stroke-width="14" stroke-linejoin="round" />
      <path d="M77 84V52h78" fill="none" stroke="url(#sky)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" />
      <circle cx="77" cy="52" r="10" fill="#020617" stroke="#38BDF8" stroke-width="6" />
      <circle cx="155" cy="52" r="11" fill="url(#forge)" />
      <path d="M155 31v-12M155 85v-12M126 52h-12M196 52h-12" stroke="#FBBF24" stroke-width="6" stroke-linecap="round" />
    </g>
    <text x="60" y="345" class="label">3. Anvil Circuit</text>
    <text x="60" y="386" class="copy">An abstract forge/anvil silhouette</text>
    <text x="60" y="410" class="copy">fused with circuit-like automation.</text>
    <g transform="translate(58 472)">
      <path d="M0 0h50v38h-50z" fill="#020617" rx="10" />
      <path d="M10 15h30l-10 13H18z" fill="none" stroke="url(#sky)" stroke-width="4" stroke-linejoin="round" />
      <circle cx="39" cy="12" r="4" fill="#F97316" />
      <text x="66" y="30" class="wordmark">RoutineForge</text>
    </g>
    <text x="60" y="560" class="tagline">MOST DISTINCTIVE</text>
  </g>
</svg>
